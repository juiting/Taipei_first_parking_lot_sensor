name: Build Windows Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # 上傳 Release asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $bad = @()
          Get-ChildItem deploy/windows/scripts/*.ps1 | ForEach-Object {
            $tokens = $null; $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs) { $bad += "$($_.Name): $($errs[0].Message)" }
          }
          if ($bad) { $bad | ForEach-Object { Write-Host $_ -ForegroundColor Red }; exit 1 }
          Write-Host 'PowerShell scripts OK'

      - name: PyInstaller build
        run: pyinstaller deploy/windows/geomag.spec --noconfirm

      - name: Assemble package
        shell: pwsh
        run: |
          $out = "P1_Geomag_Monitor"
          Move-Item dist/GeomagMonitor $out
          # 車格座標（現場可自行校正，更新腳本不覆蓋）
          New-Item -ItemType Directory -Force "$out/data/layout" | Out-Null
          Copy-Item data/layout/layout.json "$out/data/layout/"
          Copy-Item data/layout/layout_source.json "$out/data/layout/"
          # 安裝/移除/更新腳本與說明
          Copy-Item deploy/windows/install.bat,deploy/windows/uninstall.bat,deploy/windows/update.bat "$out/"
          Copy-Item -Recurse deploy/windows/scripts "$out/scripts"
          Copy-Item "deploy/windows/安裝說明.md" "$out/"

      - name: Smoke test (boot exe and hit API)
        shell: pwsh
        run: |
          # 用假連線資訊啟動：collector 會連線失敗但服務照常起來，足以驗證打包完整性
          # 刻意寫成「帶 BOM 的 UTF-8」：迴歸測試 Windows PowerShell 5.1 寫出的 .env 也能被讀取
          @(
            'CARIN_BASE_URL=http://127.0.0.1:9',
            'CARIN_USERNAME=smoke',
            'CARIN_PASSWORD=smoke',
            'POLL_INTERVAL=8',
            'API_HOST=127.0.0.1',
            'API_PORT=8610'
          ) | Set-Content P1_Geomag_Monitor/.env -Encoding utf8BOM
          $p = Start-Process -FilePath "P1_Geomag_Monitor/GeomagMonitor.exe" -WorkingDirectory "P1_Geomag_Monitor" -PassThru
          $ok = $false
          foreach ($i in 1..30) {
            try {
              $r = Invoke-WebRequest 'http://127.0.0.1:8610/api/layout' -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { Start-Sleep -Seconds 2 }
          }
          # Excel 匯出（驗證 openpyxl 打包完整）
          if ($ok) {
            try {
              $x = Invoke-WebRequest 'http://127.0.0.1:8610/api/export/xlsx' -UseBasicParsing -TimeoutSec 15
              if ($x.StatusCode -ne 200 -or $x.Content.Length -lt 1000) { $ok = $false; Write-Host 'Excel 匯出回應異常' }
            } catch { $ok = $false; Write-Host "Excel 匯出失敗: $_" }
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          Get-Content P1_Geomag_Monitor/logs/geomag.log -ErrorAction SilentlyContinue | Select-Object -Last 20
          if (-not $ok) { Write-Error '煙霧測試失敗：exe 啟動後 API 無回應' }
          Remove-Item P1_Geomag_Monitor/.env, P1_Geomag_Monitor/logs -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item P1_Geomag_Monitor/data/geomag.sqlite* -Force -ErrorAction SilentlyContinue

      - name: Zip
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } else { 'dev' }
          Compress-Archive -Path P1_Geomag_Monitor -DestinationPath "P1_Geomag_Monitor_$ver.zip"

      - name: Upload artifact (workflow_dispatch)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: P1_Geomag_Monitor
          path: P1_Geomag_Monitor_*.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: P1_Geomag_Monitor_*.zip
          generate_release_notes: true
